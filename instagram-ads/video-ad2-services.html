<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ad 2 — Services Spotlight</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a0f0a;
            font-family: 'Inter', sans-serif;
        }

        .post {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #faf7f2 0%, #f5efe4 50%, #faf7f2 100%);
        }

        /* Decorative background elements */
        .bg-circle-1 {
            position: absolute;
            top: -250px;
            right: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 169, 110, 0.1) 0%, transparent 70%);
            animation: slowDrift 12s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-circle-2 {
            position: absolute;
            bottom: -200px;
            left: -150px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(44, 158, 143, 0.06) 0%, transparent 70%);
            animation: slowDrift 14s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes slowDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -15px) scale(1.03); }
        }

        /* Top gold bar */
        .gold-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, transparent, #c8a96e, #e8c88a, #c8a96e, transparent);
            z-index: 2;
        }

        /* Brand logo top-left */
        .brand-logo {
            position: absolute;
            top: 36px;
            left: 44px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.3s forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .brand-logo svg {
            width: 28px;
            height: 28px;
            fill: #c8a96e;
        }

        .brand-logo span {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: #2c1810;
        }

        .brand-logo span em {
            font-style: normal;
            color: #c8a96e;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 100px;
            text-align: center;
        }

        /* Badge */
        .badge-animated {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: rgba(200, 169, 110, 0.12);
            border: 1px solid rgba(200, 169, 110, 0.3);
            border-radius: 50px;
            color: #a8884a;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            animation: slideDown 0.8s ease-out 0.6s forwards;
            margin-bottom: 24px;
        }

        .badge-animated i {
            color: #c8a96e;
            animation: starSpin 4s linear infinite;
        }

        @keyframes starSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Heading with typewriter-like effect */
        .heading {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #2c1810;
            line-height: 1.15;
            margin-bottom: 8px;
        }

        .heading .gold {
            background: linear-gradient(135deg, #c8a96e, #a8884a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .heading .line-1 {
            display: block;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1s forwards;
        }

        .heading .line-2 {
            display: block;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.3s forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Animated divider */
        .divider-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 20px 0 28px;
        }

        .divider {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #c8a96e, #e8c88a);
            border-radius: 2px;
            animation: dividerExpand 1s ease-out 1.8s forwards;
        }

        @keyframes dividerExpand {
            0% { width: 0; }
            100% { width: 70px; }
        }

        /* Description */
        .desc {
            font-size: 20px;
            color: #6b5b50;
            line-height: 1.7;
            max-width: 650px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 2.1s forwards;
        }

        /* Service cards row */
        .services-row {
            display: flex;
            gap: 20px;
            margin-bottom: 44px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        .service-card {
            flex: 1;
            max-width: 180px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 169, 110, 0.15);
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.3s ease;
        }

        .service-card:nth-child(1) { animation: cardSlideUp 0.6s ease-out 2.5s forwards; }
        .service-card:nth-child(2) { animation: cardSlideUp 0.6s ease-out 2.8s forwards; }
        .service-card:nth-child(3) { animation: cardSlideUp 0.6s ease-out 3.1s forwards; }
        .service-card:nth-child(4) { animation: cardSlideUp 0.6s ease-out 3.4s forwards; }

        @keyframes cardSlideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .service-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(200, 169, 110, 0.15);
        }

        .service-icon-wrap {
            width: 56px;
            height: 56px;
            margin: 0 auto 14px;
            background: linear-gradient(135deg, #f5efe4, #e8c88a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #a8884a;
            transition: transform 0.3s ease;
        }

        .service-card:hover .service-icon-wrap {
            transform: scale(1.1) rotate(-5deg);
        }

        .service-label {
            font-size: 13px;
            font-weight: 600;
            color: #6b5b50;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* CTA Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 52px;
            background: linear-gradient(135deg, #c8a96e, #a8884a);
            border: none;
            border-radius: 50px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(200, 169, 110, 0.35);
            text-decoration: none;
            opacity: 0;
            animation: ctaAppear 0.8s ease-out 3.8s forwards;
            position: relative;
            overflow: hidden;
        }

        .cta-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: shimmer 3s ease-in-out infinite 4.5s;
            transform: skewX(-20deg);
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        @keyframes ctaAppear {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .cta-button i {
            font-size: 16px;
        }

        /* Location tag bottom */
        .bottom-tag {
            position: absolute;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(107, 91, 80, 0.4);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 3;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 4.2s forwards;
        }

        .bottom-tag i {
            color: #c8a96e;
            margin: 0 6px;
        }

        .bottom-tag .star {
            color: #c8a96e;
        }

        /* Floating elements */
        .float-icon {
            position: absolute;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .float-icon-1 {
            top: 15%;
            left: 8%;
            font-size: 20px;
            color: rgba(200, 169, 110, 0.15);
            animation: floatAround 8s ease-in-out infinite;
        }

        .float-icon-2 {
            bottom: 20%;
            right: 8%;
            font-size: 24px;
            color: rgba(44, 158, 143, 0.12);
            animation: floatAround 10s ease-in-out infinite reverse;
        }

        @keyframes floatAround {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            75% { transform: translateY(10px) rotate(-3deg); }
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="bg-circle-1"></div>
        <div class="bg-circle-2"></div>
        <div class="gold-bar"></div>

        <div class="float-icon float-icon-1"><i class="fas fa-tooth"></i></div>
        <div class="float-icon float-icon-2"><i class="fas fa-smile"></i></div>

        <!-- Brand -->
        <div class="brand-logo">
            <svg viewBox="0 0 32 32">
                <path d="M10 5 L11 1 L14 4 L16 1 L18 4 L21 1 L22 5 Z" fill="#c9a96e"/>
                <path d="M16 5C11 5 8 9 8 13c0 2.5 1.2 4.5 3 5.8-.5.8-.8 1.8-.8 2.7 0 1.2.5 2.3 1.3 3.2-.8.6-1.3 1.5-1.3 2.5 0 1.7 1.3 3 3 3 1.5 0 2.7-1 3-2.5.3 1.5 1.5 2.5 3 2.5 1.7 0 3-1.3 3-3 0-1-.5-1.9-1.3-2.5.8-.9 1.3-2 1.3-3.2 0-.9-.3-1.9-.8-2.7 1.8-1.3 3-3.3 3-5.8 0-4-3-8-8-8z" fill="#f0ece4" opacity="0.9"/>
                <circle cx="11" cy="3" r="0.6" fill="#f0ece4" opacity="0.8"/>
                <circle cx="16" cy="2.5" r="0.7" fill="#f0ece4" opacity="0.8"/>
                <circle cx="21" cy="3" r="0.6" fill="#f0ece4" opacity="0.8"/>
            </svg>
            <span>Devas <em>Dental</em></span>
        </div>

        <div class="content">
            <div class="badge-animated">
                <i class="fas fa-star"></i> Premium Dental Care
            </div>

            <div class="heading">
                <span class="line-1">Your <span class="gold">Perfect Smile</span></span>
                <span class="line-2">Starts Here</span>
            </div>

            <div class="divider-wrap">
                <div class="divider"></div>
            </div>

            <p class="desc">
                Experienced, gentle, and advanced dental care —<br/>
                from routine checkups to complete smile transformations.
            </p>

            <!-- Service cards -->
            <div class="services-row">
                <div class="service-card">
                    <div class="service-icon-wrap"><i class="fas fa-tooth"></i></div>
                    <div class="service-label">General</div>
                </div>
                <div class="service-card">
                    <div class="service-icon-wrap"><i class="fas fa-smile"></i></div>
                    <div class="service-label">Cosmetic</div>
                </div>
                <div class="service-card">
                    <div class="service-icon-wrap"><i class="fas fa-teeth"></i></div>
                    <div class="service-label">Braces</div>
                </div>
                <div class="service-card">
                    <div class="service-icon-wrap"><i class="fas fa-shield-alt"></i></div>
                    <div class="service-label">Emergency</div>
                </div>
            </div>

            <button class="cta-button">
                Book Appointment <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div class="bottom-tag">
            <span class="star">✦</span> Best Dental Clinic in Gorakhpur <i class="fas fa-map-marker-alt"></i>
        </div>
    </div>
</body>
</html>
