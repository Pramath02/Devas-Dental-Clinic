<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Ad 1 — Brand Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a0f0a;
            font-family: 'Inter', sans-serif;
        }

        .post {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(160deg, #2c1810 0%, #3d281e 45%, #1a0f0a 100%);
        }

        /* Animated glowing orbs */
        .orb-1 {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 169, 110, 0.12) 0%, transparent 70%);
            animation: orbFloat 8s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-2 {
            position: absolute;
            bottom: -180px;
            left: -180px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(44, 158, 143, 0.08) 0%, transparent 70%);
            animation: orbFloat 10s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 10px) scale(0.95); }
        }

        /* Animated gold particles */
        .particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #c8a96e; opacity: 0; pointer-events: none; z-index: 1; }
        .p1 { top: 20%; left: 15%; animation: particleFade 6s ease-in-out infinite 0s; }
        .p2 { top: 30%; right: 20%; animation: particleFade 6s ease-in-out infinite 1s; }
        .p3 { bottom: 35%; left: 25%; animation: particleFade 6s ease-in-out infinite 2s; }
        .p4 { bottom: 25%; right: 15%; animation: particleFade 6s ease-in-out infinite 3s; }
        .p5 { top: 50%; left: 10%; animation: particleFade 6s ease-in-out infinite 4s; }

        @keyframes particleFade {
            0%, 100% { opacity: 0; transform: translateY(0) scale(0); }
            25% { opacity: 0.6; transform: translateY(-20px) scale(1); }
            50% { opacity: 1; transform: translateY(-40px) scale(1.2); }
            75% { opacity: 0.3; transform: translateY(-60px) scale(0.8); }
        }

        /* Gold accent bars */
        .accent-bar {
            position: absolute;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #c8a96e, #e8c88a, #c8a96e, transparent);
            z-index: 2;
        }

        .accent-bar-top {
            top: 0;
            animation: accentPulse 3s ease-in-out infinite;
        }

        .accent-bar-bottom {
            bottom: 0;
            animation: accentPulse 3s ease-in-out infinite 1.5s;
        }

        @keyframes accentPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Content */
        .content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 80px;
            text-align: center;
        }

        /* Tooth icon with glow animation */
        .tooth-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 28px;
            animation: toothAppear 1.5s ease-out forwards;
        }

        .tooth-icon svg {
            width: 100%;
            height: 100%;
        }

        @keyframes toothAppear {
            0% { opacity: 0; transform: scale(0.3) rotate(-20deg); }
            50% { opacity: 1; transform: scale(1.1) rotate(5deg); }
            70% { transform: scale(0.95) rotate(-2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .tooth-glow {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 169, 110, 0.2), transparent 70%);
            top: calc(50% - 370px);
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* Clinic name - line by line animation */
        .clinic-line-1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: -1px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.5s forwards;
        }

        .clinic-line-2 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -1px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.8s forwards;
            margin-bottom: 4px;
        }

        .clinic-line-2 span {
            background: linear-gradient(135deg, #c8a96e, #e8c88a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .clinic-line-3 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: -1px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 1.1s forwards;
        }

        .clinic-line-3 span {
            color: #c8a96e;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Animated divider */
        .divider {
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #c8a96e, #e8c88a);
            border-radius: 2px;
            margin: 20px 0;
            animation: dividerExpand 1s ease-out 1.6s forwards;
        }

        @keyframes dividerExpand {
            0% { width: 0; }
            100% { width: 80px; }
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 2s forwards;
            margin-bottom: 36px;
        }

        /* Badge with shimmer */
        .badge-container {
            opacity: 0;
            animation: fadeUp 0.8s ease-out 2.5s forwards;
            position: relative;
            margin-bottom: 16px;
        }

        .badge {
            display: inline-block;
            padding: 16px 52px;
            background: linear-gradient(135deg, #c8a96e, #a8884a);
            border-radius: 50px;
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 8px 32px rgba(200, 169, 110, 0.35);
            position: relative;
            overflow: hidden;
        }

        .badge::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s ease-in-out infinite 3s;
            transform: skewX(-20deg);
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .location {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 3s forwards;
        }

        .location i {
            color: #c8a96e;
            margin-right: 8px;
        }

        /* CTA bounce animation */
        .cta-pulse {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 3.5s forwards;
        }

        .cta-pulse span {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: bounceCta 2s ease-in-out infinite;
        }

        @keyframes bounceCta {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .cta-pulse i {
            color: #c8a96e;
            font-size: 16px;
        }

        /* Diamond decoration */
        .diamond-row {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 2;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 2.8s forwards;
        }

        .diamond {
            width: 7px;
            height: 7px;
            background: rgba(200, 169, 110, 0.25);
            transform: rotate(45deg);
        }

        .diamond:nth-child(2) { background: rgba(200, 169, 110, 0.5); }
        .diamond:nth-child(3) { background: rgba(200, 169, 110, 0.25); }
    </style>
</head>
<body>
    <div class="post">
        <div class="orb-1"></div>
        <div class="orb-2"></div>

        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>

        <div class="accent-bar accent-bar-top"></div>
        <div class="accent-bar accent-bar-bottom"></div>

        <div class="content">
            <!-- Tooth glow -->
            <div class="tooth-glow"></div>

            <!-- Tooth icon -->
            <div class="tooth-icon">
                <svg viewBox="0 0 32 32" fill="#e8c88a" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 5 L11 1 L14 4 L16 1 L18 4 L21 1 L22 5 Z" fill="#e8c88a"/>
                    <path d="M16 5C11 5 8 9 8 13c0 2.5 1.2 4.5 3 5.8-.5.8-.8 1.8-.8 2.7 0 1.2.5 2.3 1.3 3.2-.8.6-1.3 1.5-1.3 2.5 0 1.7 1.3 3 3 3 1.5 0 2.7-1 3-2.5.3 1.5 1.5 2.5 3 2.5 1.7 0 3-1.3 3-3 0-1-.5-1.9-1.3-2.5.8-.9 1.3-2 1.3-3.2 0-.9-.3-1.9-.8-2.7 1.8-1.3 3-3.3 3-5.8 0-4-3-8-8-8z" fill="#e8c88a" opacity="0.6"/>
                    <circle cx="11" cy="3" r="0.6" fill="#1a1a2e" opacity="0.6"/>
                    <circle cx="16" cy="2.5" r="0.7" fill="#1a1a2e" opacity="0.6"/>
                    <circle cx="21" cy="3" r="0.6" fill="#1a1a2e" opacity="0.6"/>
                </svg>
            </div>

            <div class="clinic-line-1">Welcome to</div>
            <div class="clinic-line-2"><span>Devas Dental</span></div>
            <div class="clinic-line-3">Clinic<span>.</span></div>

            <div class="divider"></div>

            <div class="tagline">Your Smile, Our Passion</div>

            <div class="badge-container">
                <div class="badge">Best Dental Clinic in Gorakhpur</div>
            </div>

            <div class="location">
                <i class="fas fa-map-marker-alt"></i> Since 2005 • Gorakhpur
            </div>

            <div class="diamond-row">
                <div class="diamond"></div>
                <div class="diamond"></div>
                <div class="diamond"></div>
            </div>

            <div class="cta-pulse">
                <span><i class="fas fa-calendar-check"></i> Book Now — <i class="fas fa-phone"></i> Call Us Today</span>
            </div>
        </div>
    </div>
</body>
</html>
