<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 2 — Smile Makeover</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a0f0a;
            font-family: 'Inter', sans-serif;
        }

        .post {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background: #faf7f2;
        }

        /* Warm gradient overlay top-left */
        .post::before {
            content: '';
            position: absolute;
            top: -300px;
            left: -200px;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 169, 110, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Teal accent bottom-right */
        .post::after {
            content: '';
            position: absolute;
            bottom: -250px;
            right: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(44, 158, 143, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Gold top accent bar */
        .accent-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #c8a96e, #e8c88a, #c8a96e);
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 80px;
            text-align: center;
        }

        .service-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: rgba(200, 169, 110, 0.12);
            border: 1px solid rgba(200, 169, 110, 0.3);
            border-radius: 50px;
            color: #a8884a;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .service-badge i {
            color: #c8a96e;
        }

        .main-heading {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #2c1810;
            line-height: 1.15;
            margin-bottom: 16px;
        }

        .main-heading .gold {
            background: linear-gradient(135deg, #c8a96e, #a8884a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-heading .light {
            font-weight: 500;
            color: #6b5b50;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #c8a96e, #e8c88a);
            border-radius: 2px;
            margin: 24px 0 32px;
        }

        .description {
            font-size: 22px;
            color: #6b5b50;
            line-height: 1.7;
            max-width: 700px;
            margin-bottom: 48px;
            font-weight: 400;
        }

        /* Service icons row */
        .service-row {
            display: flex;
            gap: 48px;
            margin-bottom: 48px;
        }

        .service-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .service-item-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: linear-gradient(135deg, #f5efe4, #e8c88a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #a8884a;
            transition: transform 0.3s ease;
        }

        .service-item-label {
            font-size: 14px;
            font-weight: 600;
            color: #6b5b50;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 52px;
            background: linear-gradient(135deg, #c8a96e, #a8884a);
            border: none;
            border-radius: 50px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(200, 169, 110, 0.35);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .cta-button i {
            font-size: 18px;
        }

        .location-tag {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(107, 91, 80, 0.5);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 2;
        }

        .location-tag i {
            color: #c8a96e;
            margin-right: 6px;
        }

        /* Brand logo top-left */
        .brand-logo {
            position: absolute;
            top: 32px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 3;
        }

        .brand-logo svg {
            width: 28px;
            height: 28px;
            fill: #c8a96e;
        }

        .brand-logo span {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: #2c1810;
        }

        .brand-logo span em {
            font-style: normal;
            color: #c8a96e;
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="accent-bar"></div>

        <!-- Brand logo -->
        <div class="brand-logo">
            <svg viewBox="0 0 32 32">
                <path d="M10 5 L11 1 L14 4 L16 1 L18 4 L21 1 L22 5 Z" fill="#c9a96e"/>
                <path d="M16 5C11 5 8 9 8 13c0 2.5 1.2 4.5 3 5.8-.5.8-.8 1.8-.8 2.7 0 1.2.5 2.3 1.3 3.2-.8.6-1.3 1.5-1.3 2.5 0 1.7 1.3 3 3 3 1.5 0 2.7-1 3-2.5.3 1.5 1.5 2.5 3 2.5 1.7 0 3-1.3 3-3 0-1-.5-1.9-1.3-2.5.8-.9 1.3-2 1.3-3.2 0-.9-.3-1.9-.8-2.7 1.8-1.3 3-3.3 3-5.8 0-4-3-8-8-8z" fill="#f0ece4" opacity="0.9"/>
                <circle cx="11" cy="3" r="0.6" fill="#f0ece4" opacity="0.8"/>
                <circle cx="16" cy="2.5" r="0.7" fill="#f0ece4" opacity="0.8"/>
                <circle cx="21" cy="3" r="0.6" fill="#f0ece4" opacity="0.8"/>
            </svg>
            <span>Devas <em>Dental</em></span>
        </div>

        <div class="content">
            <div class="service-badge">
                <i class="fas fa-star"></i> Premium Dental Care
            </div>

            <div class="main-heading">
                Transform Your<br/>
                <span class="gold">Smile</span> <span class="light">Today</span>
            </div>

            <div class="divider"></div>

            <p class="description">
                From teeth whitening to complete smile makeovers —<br/>
                experience world-class cosmetic dentistry in a warm,<br/>
                comfortable environment you'll love.
            </p>

            <!-- Service icons -->
            <div class="service-row">
                <div class="service-item">
                    <div class="service-item-icon"><i class="fas fa-smile"></i></div>
                    <span class="service-item-label">Whitening</span>
                </div>
                <div class="service-item">
                    <div class="service-item-icon"><i class="fas fa-gem"></i></div>
                    <span class="service-item-label">Veneers</span>
                </div>
                <div class="service-item">
                    <div class="service-item-icon"><i class="fas fa-brush"></i></div>
                    <span class="service-item-label">Cleaning</span>
                </div>
                <div class="service-item">
                    <div class="service-item-icon"><i class="fas fa-shield-alt"></i></div>
                    <span class="service-item-label">Checkups</span>
                </div>
            </div>

            <a href="#" class="cta-button">
                Book Your Appointment <i class="fas fa-arrow-right"></i>
            </a>
        </div>

        <div class="location-tag">
            <i class="fas fa-map-marker-alt"></i> Best Dental Clinic in Gorakhpur
        </div>
    </div>
</body>
</html>
